name: Build and Release ImageMagick SDK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for example: v7.1.2-13-1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ninja-build \
            curl \
            tar \
            xz-utils \
            jq

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.imagemagick' versions/default.json)"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          RELEASE_ID="${TAG#v}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_name=imagemagick-${RELEASE_ID}-ubuntu-24.04-x86_64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build ImageMagick SDK
        env:
          PREFIX: ${{ runner.temp }}/package/imagemagick/${{ steps.meta.outputs.version }}
          BUILD_DIR: ${{ runner.temp }}/build
          JOBS: 2
        run: ./scripts/build-imagemagick.sh

      - name: Verify build output
        env:
          PREFIX: ${{ runner.temp }}/package/imagemagick/${{ steps.meta.outputs.version }}
          PKG_CONFIG_PATH: ${{ runner.temp }}/package/imagemagick/${{ steps.meta.outputs.version }}/lib/pkgconfig
        run: ./scripts/verify-imagemagick.sh

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -C "${RUNNER_TEMP}/package" \
            -czf "dist/${{ steps.meta.outputs.asset_name }}" \
            imagemagick
          sha256sum "dist/${{ steps.meta.outputs.asset_name }}" \
            > "dist/${{ steps.meta.outputs.asset_name }}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imagemagick-sdk-${{ steps.meta.outputs.version }}
          path: dist/*

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/${{ steps.meta.outputs.asset_name }}
            dist/${{ steps.meta.outputs.asset_name }}.sha256
          generate_release_notes: true
