name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test ImageMagick (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_name: ubuntu22.04
          - runner: ubuntu-24.04
            os_name: ubuntu24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and verify ImageMagick
        uses: ./.github/actions/build-imagemagick
