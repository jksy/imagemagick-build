name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  build-and-test:
    name: Build and Test ImageMagick (${{ matrix.os_tag }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_tag: ubuntu22.04
            arch: x86_64
          - runner: ubuntu-24.04
            os_tag: ubuntu24.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            os_tag: ubuntu22.04
            arch: aarch64
          - runner: ubuntu-24.04-arm
            os_tag: ubuntu24.04
            arch: aarch64
          - runner: ubuntu-24.04
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: aarch64

    steps:
      - name: Install tar and git (AL2023 minimal container)
        if: matrix.os_tag == 'amzn2023'
        run: dnf install -y tar git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and verify ImageMagick
        uses: ./.github/actions/build-imagemagick
        with:
          cache_suffix: ${{ matrix.os_tag }}-${{ matrix.arch }}
