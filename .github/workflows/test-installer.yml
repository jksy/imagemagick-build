name: Test Installer

on:
  pull_request:
    branches:
      - main
    paths:
      - 'install.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-default-install:
    name: Test install.sh (${{ matrix.os_tag }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_tag: ubuntu22.04
            arch: x86_64
          - runner: ubuntu-24.04
            os_tag: ubuntu24.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            os_tag: ubuntu22.04
            arch: aarch64
          - runner: ubuntu-24.04-arm
            os_tag: ubuntu24.04
            arch: aarch64
          - runner: ubuntu-24.04
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: aarch64

    container: ${{ matrix.container || '' }}

    steps:
      - name: Install git (AL2023 minimal container)
        if: matrix.os_tag == 'amzn2023'
        run: dnf install -y git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version
          magick -list format | grep -iE 'JPEG|PNG|TIFF|WEBP|AVIF|PDF'

      - name: Verify pkg-config prefix
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          INSTALL_DIR="/opt/imagemagick/${IM_VERSION}"
          export PKG_CONFIG_PATH="${INSTALL_DIR}/lib/pkgconfig"
          export LD_LIBRARY_PATH="${INSTALL_DIR}/lib"
          PC_PREFIX=$(pkg-config --variable=prefix MagickCore)
          echo "pkg-config prefix: ${PC_PREFIX}"
          if [[ "$PC_PREFIX" != "$INSTALL_DIR" ]]; then
            echo "ERROR: prefix mismatch: expected ${INSTALL_DIR}, got ${PC_PREFIX}" >&2
            exit 1
          fi
          echo "OK: prefix matches installation path"

  test-custom-install-base:
    name: Test install.sh with custom IMAGEMAGICK_INSTALL_BASE
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install.sh with custom path
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: IMAGEMAGICK_INSTALL_BASE="${HOME}/.local" bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls "${HOME}/.local/imagemagick/")
          export PATH="${HOME}/.local/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="${HOME}/.local/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version

      - name: Verify pkg-config prefix
        run: |
          IM_VERSION=$(ls "${HOME}/.local/imagemagick/")
          INSTALL_DIR="${HOME}/.local/imagemagick/${IM_VERSION}"
          export PKG_CONFIG_PATH="${INSTALL_DIR}/lib/pkgconfig"
          export LD_LIBRARY_PATH="${INSTALL_DIR}/lib"
          PC_PREFIX=$(pkg-config --variable=prefix MagickCore)
          echo "pkg-config prefix: ${PC_PREFIX}"
          if [[ "$PC_PREFIX" != "$INSTALL_DIR" ]]; then
            echo "ERROR: prefix mismatch: expected ${INSTALL_DIR}, got ${PC_PREFIX}" >&2
            exit 1
          fi
          echo "OK: prefix matches installation path"

  test-version-pinned-install:
    name: Test install.sh with IMAGEMAGICK_VERSION
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest release tag
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/repos/jksy/imagemagick-build/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Run install.sh with pinned version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: IMAGEMAGICK_VERSION="${{ steps.latest.outputs.tag }}" bash install.sh

      - name: Verify pinned version is installed
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version
          echo "Installed version: ${IM_VERSION}"
          echo "Requested tag: ${{ steps.latest.outputs.tag }}"

  test-version-without-v-prefix:
    name: Test install.sh with IMAGEMAGICK_VERSION without v prefix
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest release tag (strip v prefix)
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/repos/jksy/imagemagick-build/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=${TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Run install.sh with version without v prefix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: IMAGEMAGICK_VERSION="${{ steps.latest.outputs.tag }}" bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version
          echo "Installed version: ${IM_VERSION}"
          echo "Requested tag (no v prefix): ${{ steps.latest.outputs.tag }}"

  test-version-with-v-prefix:
    name: Test install.sh with IMAGEMAGICK_VERSION with v prefix
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest release tag (with v prefix)
        id: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" "https://api.github.com/repos/jksy/imagemagick-build/releases/latest" | grep '"tag_name"' | cut -d'"' -f4)
          echo "tag=v${TAG#v}" >> "${GITHUB_OUTPUT}"

      - name: Run install.sh with version with v prefix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: IMAGEMAGICK_VERSION="${{ steps.latest.outputs.tag }}" bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version
          echo "Installed version: ${IM_VERSION}"
          echo "Requested tag (with v prefix): ${{ steps.latest.outputs.tag }}"

  test-unsupported-os:
    name: Test error on unsupported OS (Ubuntu 20.04)
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:20.04

    steps:
      - name: Install git
        run: |
          apt-get update -qq
          apt-get install -y -qq git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Expect failure on unsupported Ubuntu version
        run: |
          if bash install.sh 2>&1; then
            echo "ERROR: install.sh should have failed on Ubuntu 20.04" >&2
            exit 1
          fi
          echo "OK: install.sh correctly rejected the unsupported Ubuntu version"
