name: Test Installer

on:
  pull_request:
    branches:
      - main
    paths:
      - 'install.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-default-install:
    name: Test install.sh (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
          - runner: ubuntu-24.04
          - runner: ubuntu-22.04-arm
          - runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install.sh
        run: bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls /opt/imagemagick/)
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version
          magick -list format | grep -iE 'JPEG|PNG|TIFF|WEBP|AVIF|PDF'

  test-custom-install-base:
    name: Test install.sh with custom IMAGEMAGICK_INSTALL_BASE
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run install.sh with custom path
        run: IMAGEMAGICK_INSTALL_BASE="${HOME}/.local" bash install.sh

      - name: Verify installation
        run: |
          IM_VERSION=$(ls "${HOME}/.local/imagemagick/")
          export PATH="${HOME}/.local/imagemagick/${IM_VERSION}/bin:${PATH}"
          export LD_LIBRARY_PATH="${HOME}/.local/imagemagick/${IM_VERSION}/lib:${LD_LIBRARY_PATH:-}"
          magick -version

  test-unsupported-os:
    name: Test error on unsupported OS (Ubuntu 20.04)
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:20.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq curl git

      - name: Checkout
        uses: actions/checkout@v6

      - name: Expect failure on unsupported Ubuntu version
        run: |
          if bash install.sh 2>&1; then
            echo "ERROR: install.sh should have failed on Ubuntu 20.04" >&2
            exit 1
          fi
          echo "OK: install.sh correctly rejected the unsupported Ubuntu version"
