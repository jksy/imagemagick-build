name: Build and Release ImageMagick

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_file:
        description: 'Path to version JSON file'
        required: false
        default: 'versions/default.json'

permissions:
  contents: write

jobs:
  build:
    name: Build ImageMagick (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_version: 22.04
            arch: x86_64
          - runner: ubuntu-24.04
            os_version: 24.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            os_version: 22.04
            arch: aarch64
          - runner: ubuntu-24.04-arm
            os_version: 24.04
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and verify ImageMagick
        id: build
        uses: ./.github/actions/build-imagemagick
        with:
          version_file: ${{ github.event.inputs.version_file || 'versions/default.json' }}
          cache_suffix: ${{ matrix.runner }}

      - name: Package build
        run: |
          chmod +x scripts/package.sh
          mkdir -p /tmp/artifacts
          sudo VERSION_FILE="${{ steps.build.outputs.version_file }}" \
               UBUNTU_VERSION=${{ matrix.os_version }} \
               ARCH=${{ matrix.arch }} \
               PREFIX=/opt/imagemagick \
               ARCHIVE_DIR=/tmp/artifacts \
               bash scripts/package.sh
          ls -lh /tmp/artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: imagemagick-${{ steps.build.outputs.imagemagick }}-ubuntu${{ matrix.os_version }}-${{ matrix.arch }}
          path: /tmp/artifacts/*.tar.gz
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read versions
        id: versions
        run: |
          IM_VERSION=$(jq -r '.imagemagick' versions/default.json)
          {
            echo "imagemagick=${IM_VERSION}"
            echo "libjpeg_turbo=$(jq -r '.libjpeg_turbo' versions/default.json)"
            echo "libpng=$(jq -r '.libpng' versions/default.json)"
            echo "libtiff=$(jq -r '.libtiff' versions/default.json)"
            echo "lcms2=$(jq -r '.lcms2' versions/default.json)"
            echo "libwebp=$(jq -r '.libwebp' versions/default.json)"
            echo "libaom=$(jq -r '.libaom' versions/default.json)"
            echo "libheif=$(jq -r '.libheif' versions/default.json)"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect tag type
        id: tag_type
        run: |
          TAG="${{ github.ref_name }}"
          IM_VERSION="${{ steps.versions.outputs.imagemagick }}"
          # Dated snapshot tags look like v7.1.2-18-20260405 or v7.1.2-18-20260405-2
          if [[ "${TAG}" == "v${IM_VERSION}-"* ]]; then
            echo "is_dated=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_dated=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: imagemagick-${{ steps.versions.outputs.imagemagick }}-ubuntu*
          merge-multiple: true
          path: /tmp/artifacts/

      - name: Generate release body
        run: |
          IM_VERSION="${{ steps.versions.outputs.imagemagick }}"
          cat > /tmp/release_body.md << BODYEOF
          ## ImageMagick ${IM_VERSION} — Ubuntu 22.04 / 24.04 · x86_64 / aarch64

          Pre-built ImageMagick binary with SDK for RMagick / CI use.

          ### Included libraries

          | Library | Version |
          |---------|---------|
          | ImageMagick | ${IM_VERSION} |
          | libjpeg-turbo | ${{ steps.versions.outputs.libjpeg_turbo }} |
          | libpng | ${{ steps.versions.outputs.libpng }} |
          | libtiff | ${{ steps.versions.outputs.libtiff }} |
          | lcms2 | ${{ steps.versions.outputs.lcms2 }} |
          | libwebp | ${{ steps.versions.outputs.libwebp }} |
          | libaom | ${{ steps.versions.outputs.libaom }} |
          | libheif | ${{ steps.versions.outputs.libheif }} |

          ### Supported formats

          JPEG · PNG · TIFF · WebP · AVIF · PDF

          ### Install

          \`\`\`bash
          tar -xzf imagemagick-*.tar.gz -C /opt
          export PATH="/opt/imagemagick/${IM_VERSION}/bin:\$PATH"
          export PKG_CONFIG_PATH="/opt/imagemagick/${IM_VERSION}/lib/pkgconfig:\$PKG_CONFIG_PATH"
          export LD_LIBRARY_PATH="/opt/imagemagick/${IM_VERSION}/lib:\$LD_LIBRARY_PATH"
          \`\`\`
          BODYEOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ImageMagick ${{ steps.versions.outputs.imagemagick }}
          body_path: /tmp/release_body.md
          files: /tmp/artifacts/*.tar.gz
          draft: false
          prerelease: false

      - name: Update rolling release
        if: steps.tag_type.outputs.is_dated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ROLLING_TAG="v${{ steps.versions.outputs.imagemagick }}"

          # Upload new artifacts, overwriting existing ones (-clobber replaces files with same name)
          gh release upload "${ROLLING_TAG}" /tmp/artifacts/*.tar.gz --clobber

          # Update release title and body
          gh release edit "${ROLLING_TAG}" \
            --title "ImageMagick ${{ steps.versions.outputs.imagemagick }}" \
            --notes-file /tmp/release_body.md
