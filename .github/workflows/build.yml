name: Build and Release ImageMagick

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_file:
        description: 'Path to library versions file'
        required: false
        default: 'libraries.json'
      skip_tests:
        description: 'Skip make check (emergency use only)'
        required: false
        default: 'false'
      no_cache:
        description: 'Ignore cached build and force full rebuild'
        required: false
        default: 'false'

permissions:
  contents: write
  id-token: write      # OIDC token for artifact attestation
  attestations: write  # GitHub native artifact attestation

jobs:
  build:
    name: Build ImageMagick (${{ matrix.os_tag }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_tag: ubuntu22.04
            arch: x86_64
          - runner: ubuntu-24.04
            os_tag: ubuntu24.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            os_tag: ubuntu22.04
            arch: aarch64
          - runner: ubuntu-24.04-arm
            os_tag: ubuntu24.04
            arch: aarch64
          - runner: ubuntu-24.04
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: x86_64
          - runner: ubuntu-24.04-arm
            container: amazonlinux:2023
            os_tag: amzn2023
            arch: aarch64

    steps:
      - name: Install tar and git (AL2023 minimal container)
        if: matrix.os_tag == 'amzn2023'
        run: dnf install -y tar git

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and verify ImageMagick
        id: build
        uses: ./.github/actions/build-imagemagick
        with:
          version_file: ${{ github.event.inputs.version_file || 'libraries.json' }}
          cache_suffix: ${{ matrix.os_tag }}-${{ matrix.arch }}
          skip_tests: ${{ github.event.inputs.skip_tests || 'false' }}
          no_cache: ${{ github.event.inputs.no_cache || 'false' }}

      - name: Package build
        run: |
          chmod +x scripts/package.sh
          mkdir -p /tmp/artifacts
          SUDO_CMD="$(command -v sudo 2>/dev/null || true)"
          $SUDO_CMD env \
               LIBRARIES_FILE="${{ steps.build.outputs.version_file }}" \
               OS_TAG=${{ matrix.os_tag }} \
               ARCH=${{ matrix.arch }} \
               PREFIX=/opt/imagemagick \
               ARCHIVE_DIR=/tmp/artifacts \
               bash scripts/package.sh
          ls -lh /tmp/artifacts/

      - name: Generate SBOM
        run: |
          for tarball in /tmp/artifacts/*.tar.gz; do
            sbom="${tarball%.tar.gz}.sbom.json"
            LIBRARIES_FILE="${{ steps.build.outputs.version_file }}" \
              OS_TAG=${{ matrix.os_tag }} \
              ARCH=${{ matrix.arch }} \
              bash scripts/generate-sbom.sh "$sbom"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: imagemagick-${{ steps.build.outputs.imagemagick }}-${{ matrix.os_tag }}-${{ matrix.arch }}
          path: /tmp/artifacts/
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read versions
        id: versions
        run: |
          # Read all library versions from libraries.json
          jq -r '.[] | select(.key) | "\(.key)=\(.version)"' libraries.json | while IFS='=' read -r key version; do
            case "${key}" in
              imagemagick) echo "imagemagick=${version}" ;;
              libjpeg_turbo) echo "libjpeg_turbo=${version}" ;;
              libpng) echo "libpng=${version}" ;;
              libtiff) echo "libtiff=${version}" ;;
              lcms2) echo "lcms2=${version}" ;;
              libwebp) echo "libwebp=${version}" ;;
              libaom) echo "libaom=${version}" ;;
              libde265) echo "libde265=${version}" ;;
              libheif) echo "libheif=${version}" ;;
            esac
          done >> "${GITHUB_OUTPUT}"

      - name: Detect tag type
        id: tag_type
        run: |
          TAG="${{ github.ref_name }}"
          IM_VERSION="${{ steps.versions.outputs.imagemagick }}"
          # Dated snapshot tags look like v7.1.2-18-20260405 or v7.1.2-18-20260405-2
          if [[ "${TAG}" == "v${IM_VERSION}-"* ]]; then
            echo "is_dated=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_dated=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: imagemagick-${{ steps.versions.outputs.imagemagick }}-*
          merge-multiple: true
          path: /tmp/artifacts/

      - name: Generate release body
        run: |
          IM_VERSION="${{ steps.versions.outputs.imagemagick }}"
          cat > /tmp/release_body.md << BODYEOF
          ## ImageMagick ${IM_VERSION} — Ubuntu 22.04 / 24.04 · Amazon Linux 2023 · x86_64 / aarch64

          Pre-built ImageMagick binary with SDK for RMagick / CI use.

          ### Included libraries

          | Library | Version |
          |---------|---------|
          | ImageMagick | ${IM_VERSION} |
          | libjpeg-turbo | ${{ steps.versions.outputs.libjpeg_turbo }} |
          | libpng | ${{ steps.versions.outputs.libpng }} |
          | libtiff | ${{ steps.versions.outputs.libtiff }} |
          | lcms2 | ${{ steps.versions.outputs.lcms2 }} |
          | libwebp | ${{ steps.versions.outputs.libwebp }} |
          | libaom | ${{ steps.versions.outputs.libaom }} |
          | libheif | ${{ steps.versions.outputs.libheif }} |

          ### Supported formats

          JPEG · PNG · TIFF · WebP · AVIF · PDF

          ### Install

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/jksy/imagemagick-build/main/install.sh | IMAGEMAGICK_VERSION=${{ github.ref_name }} bash
          \`\`\`

          最新版をインストールする場合 / To install the latest version:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/jksy/imagemagick-build/main/install.sh | bash
          \`\`\`
          BODYEOF

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ImageMagick ${{ steps.versions.outputs.imagemagick }}
          body_path: /tmp/release_body.md
          files: /tmp/artifacts/*
          draft: false
          prerelease: false

      - name: Verify archive contents
        run: |
          echo "::group::Verifying archive contents"
          fail=0
          for archive in /tmp/artifacts/*.tar.gz; do
            echo "--- ${archive##*/} ---"
            license_count=$(tar -tzf "${archive}" | grep -cE 'LICENSES/.+\.txt$' || true)
            if [ "${license_count}" -eq 0 ]; then
              echo "  ERROR: no license files found" >&2
              fail=1
            else
              echo "  OK: ${license_count} license file(s)"
            fi
            if tar -tzf "${archive}" | grep -qE 'VERSIONS$'; then
              echo "  OK: VERSIONS file found"
            else
              echo "  ERROR: VERSIONS file not found" >&2
              fail=1
            fi
          done
          echo "::endgroup::"
          exit "${fail}"

      - name: Update rolling release
        if: steps.tag_type.outputs.is_dated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ROLLING_TAG="v${{ steps.versions.outputs.imagemagick }}"

          # Upload new artifacts, overwriting existing ones (-clobber replaces files with same name)
          gh release upload "${ROLLING_TAG}" /tmp/artifacts/* --clobber

          # Update release title and body
          gh release edit "${ROLLING_TAG}" \
            --title "ImageMagick ${{ steps.versions.outputs.imagemagick }}" \
            --notes-file /tmp/release_body.md

  attest:
    name: Attest build provenance
    needs: [build, release]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      attestations: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: imagemagick-*
          merge-multiple: true
          path: /tmp/artifacts/

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: /tmp/artifacts/*.tar.gz
