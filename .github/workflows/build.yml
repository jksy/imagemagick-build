name: Build and Release ImageMagick

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_file:
        description: 'Path to version JSON file'
        required: false
        default: 'versions/default.json'

permissions:
  contents: write

jobs:
  build:
    name: Build ImageMagick (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os_version: 22.04
          - runner: ubuntu-24.04
            os_version: 24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and verify ImageMagick
        id: build
        uses: ./.github/actions/build-imagemagick
        with:
          version_file: ${{ github.event.inputs.version_file || 'versions/default.json' }}

      - name: Package build
        run: |
          chmod +x scripts/package.sh
          mkdir -p /tmp/artifacts
          sudo VERSION_FILE="${{ steps.build.outputs.version_file }}" \
               UBUNTU_VERSION=${{ matrix.os_version }} \
               PREFIX=/opt/imagemagick \
               ARCHIVE_DIR=/tmp/artifacts \
               bash scripts/package.sh
          ls -lh /tmp/artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imagemagick-${{ steps.build.outputs.imagemagick }}-ubuntu${{ matrix.os_version }}-x86_64
          path: /tmp/artifacts/*.tar.gz
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions
        id: versions
        run: |
          IM_VERSION=$(jq -r '.imagemagick' versions/default.json)
          echo "imagemagick=${IM_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "libjpeg_turbo=$(jq -r '.libjpeg_turbo' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "libpng=$(jq -r '.libpng' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "libtiff=$(jq -r '.libtiff' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "lcms2=$(jq -r '.lcms2' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "libwebp=$(jq -r '.libwebp' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "libaom=$(jq -r '.libaom' versions/default.json)" >> "${GITHUB_OUTPUT}"
          echo "libheif=$(jq -r '.libheif' versions/default.json)" >> "${GITHUB_OUTPUT}"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: imagemagick-${{ steps.versions.outputs.imagemagick }}-ubuntu*-x86_64
          merge-multiple: true
          path: /tmp/artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ImageMagick ${{ steps.versions.outputs.imagemagick }}
          body: |
            ## ImageMagick ${{ steps.versions.outputs.imagemagick }} — Ubuntu 22.04 / 24.04 x86_64

            Pre-built ImageMagick binary with SDK for RMagick / CI use.

            ### Included libraries

            | Library | Version |
            |---------|---------|
            | ImageMagick | ${{ steps.versions.outputs.imagemagick }} |
            | libjpeg-turbo | ${{ steps.versions.outputs.libjpeg_turbo }} |
            | libpng | ${{ steps.versions.outputs.libpng }} |
            | libtiff | ${{ steps.versions.outputs.libtiff }} |
            | lcms2 | ${{ steps.versions.outputs.lcms2 }} |
            | libwebp | ${{ steps.versions.outputs.libwebp }} |
            | libaom | ${{ steps.versions.outputs.libaom }} |
            | libheif | ${{ steps.versions.outputs.libheif }} |

            ### Supported formats

            JPEG · PNG · TIFF · WebP · AVIF · PDF

            ### Install

            ```bash
            tar -xzf imagemagick-*.tar.gz -C /opt
            export PATH="/opt/imagemagick/${{ steps.versions.outputs.imagemagick }}/bin:$PATH"
            export PKG_CONFIG_PATH="/opt/imagemagick/${{ steps.versions.outputs.imagemagick }}/lib/pkgconfig:$PKG_CONFIG_PATH"
            export LD_LIBRARY_PATH="/opt/imagemagick/${{ steps.versions.outputs.imagemagick }}/lib:$LD_LIBRARY_PATH"
            ```
          files: /tmp/artifacts/*.tar.gz
          draft: false
          prerelease: false
