name: Build ImageMagick
description: Install dependencies, build all libraries and ImageMagick, and verify the build

inputs:
  version_file:
    description: 'Path to library versions file'
    required: false
    default: 'libraries.json'
  cache_suffix:
    description: 'Cache key suffix to separate build environments (e.g. ubuntu-22.04)'
    required: false
    default: ''
  skip_tests:
    description: 'Set to "true" to skip make check'
    required: false
    default: 'false'
  no_cache:
    description: 'Set to "true" to skip cache restore and force full rebuild'
    required: false
    default: 'false'

outputs:
  imagemagick:
    description: 'ImageMagick version that was built'
    value: ${{ steps.versions.outputs.imagemagick }}
  version_file:
    description: 'Path to the version JSON file used'
    value: ${{ steps.versions.outputs.version_file }}

runs:
  using: composite
  steps:
    - name: Install system build dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        SUDO_CMD="$(command -v sudo 2>/dev/null || true)"
        if command -v apt-get &>/dev/null; then
          $SUDO_CMD apt-get update -qq
          $SUDO_CMD apt-get install -y --no-install-recommends \
            build-essential \
            git \
            cmake \
            ninja-build \
            autoconf \
            automake \
            libtool \
            pkg-config \
            jq \
            ghostscript \
            zlib1g-dev \
            libfreetype6-dev \
            ca-certificates
          if [ "$(uname -m)" = "x86_64" ]; then
            $SUDO_CMD apt-get install -y --no-install-recommends nasm
          fi
        elif command -v dnf &>/dev/null; then
          dnf install -y \
            gcc \
            gcc-c++ \
            make \
            git \
            cmake \
            ninja-build \
            autoconf \
            automake \
            libtool \
            pkgconf-pkg-config \
            jq \
            ghostscript \
            zlib-devel \
            freetype-devel \
            ca-certificates
          if [ "$(uname -m)" = "x86_64" ]; then
            dnf install -y nasm
          fi
        else
          echo "Error: No supported package manager found (apt-get or dnf)" >&2
          exit 1
        fi

    - name: Read versions
      id: versions
      shell: bash
      run: |
        VERSION_FILE="${{ inputs.version_file }}"
        IM_VERSION=$(jq -r '.imagemagick' "${VERSION_FILE}")
        echo "imagemagick=${IM_VERSION}" >> "${GITHUB_OUTPUT}"
        echo "version_file=${VERSION_FILE}" >> "${GITHUB_OUTPUT}"

    - name: Prepare install prefix
      shell: bash
      run: |
        if command -v sudo &>/dev/null; then
          sudo mkdir -p /opt/imagemagick
          sudo chown -R "$USER" /opt/imagemagick
        else
          mkdir -p /opt/imagemagick
        fi

    - name: Compute cache key inputs
      id: version-hash
      shell: bash
      run: |
        versions_hash=$(sha256sum '${{ inputs.version_file }}' | cut -d' ' -f1)
        scripts_hash=$(find scripts/ -name '*.sh' | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)
        echo "hash=${versions_hash}-${scripts_hash}" >> "${GITHUB_OUTPUT}"

    - name: Restore library cache
      id: cache
      if: inputs.no_cache != 'true'
      uses: actions/cache@v5
      with:
        path: /opt/imagemagick
        key: v3-imagemagick-libs-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache_suffix }}-${{ steps.version-hash.outputs.hash }}

    - name: Build all libraries and ImageMagick
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
        SKIP_TESTS: ${{ inputs.skip_tests == 'true' && '1' || '0' }}
      run: |
        chmod +x scripts/build.sh
        VERSION_FILE="${{ inputs.version_file }}" \
             BUILD_DIR=/tmp/imagemagick-build \
             bash scripts/build.sh

    - name: Upload test suite log on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: imagemagick-test-suite-log-${{ runner.os }}-${{ runner.arch }}
        path: /tmp/imagemagick-build/imagemagick/tests/test-suite.log
        if-no-files-found: ignore
        retention-days: 7

    - name: Verify build
      shell: bash
      run: |
        chmod +x scripts/verify.sh
        PREFIX=/opt/imagemagick bash scripts/verify.sh
