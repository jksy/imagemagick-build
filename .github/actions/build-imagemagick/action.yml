name: Build ImageMagick
description: Install dependencies, build all libraries and ImageMagick, and verify the build

inputs:
  version_file:
    description: 'Path to version JSON file'
    required: false
    default: 'versions/default.json'

outputs:
  imagemagick:
    description: 'ImageMagick version that was built'
    value: ${{ steps.versions.outputs.imagemagick }}
  version_file:
    description: 'Path to the version JSON file used'
    value: ${{ steps.versions.outputs.version_file }}

runs:
  using: composite
  steps:
    - name: Install system build dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          git \
          cmake \
          nasm \
          ninja-build \
          autoconf \
          automake \
          libtool \
          pkg-config \
          jq \
          zlib1g-dev \
          ca-certificates

    - name: Read versions
      id: versions
      shell: bash
      run: |
        VERSION_FILE="${{ inputs.version_file }}"
        IM_VERSION=$(jq -r '.imagemagick' "${VERSION_FILE}")
        echo "imagemagick=${IM_VERSION}" >> "${GITHUB_OUTPUT}"
        echo "version_file=${VERSION_FILE}" >> "${GITHUB_OUTPUT}"

    - name: Build all libraries and ImageMagick
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        chmod +x scripts/build.sh
        sudo VERSION_FILE="${{ steps.versions.outputs.version_file }}" \
             BUILD_DIR=/tmp/imagemagick-build \
             bash scripts/build.sh

    - name: Verify build
      shell: bash
      run: |
        chmod +x scripts/verify.sh
        PREFIX=/opt/imagemagick bash scripts/verify.sh
